app = "carecoreplus-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  CARECORE_AUTO_CREATE_TABLES = "false"
  CARECORE_ONBOARDING_PUBLICO = "false"
  CARECORE_CORS_ORIGINS = "https://app.carecoreplus.com.br,https://carecore-app.vercel.app,https://carecore-app-git-master-amadeu-claudios-projects.vercel.app"
  CARECORE_LOG_FORMAT = "json"
  CARECORE_LOG_LEVEL = "INFO"
  SQLALCHEMY_ECHO = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
